<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tags and Attributes</title>
</head>
<body>
  <!-- Container tags -->
  <div id="main" class="card highlighted">
    <p>I am a paragraph inside a div.</p>
  </div>

  <!-- Standalone (void) tags -->
  <img src="cat.jpg" alt="A gray cat sleeping on a windowsill">
  <hr>
  <br>
  <input type="text" placeholder="Type here">

  <!-- data- attributes for JS to use later -->
  <button data-user-id="42">Click me</button>
</body>
</html>
